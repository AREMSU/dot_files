# hyprlock.conf
# Tuned for 1366x768 display

general {
    hide_cursor = true
}

background {
    monitor =
    # path = ~/Wallpapers/geararam.jpg
    path = ~/Wallpapers/lock.png
    blur_passes = 0
    blur_size = 0
    brightness = 0.8
}

# ===== GREETING =====
label {
    monitor =
    text = Welcome!
    color = rgba(255, 255, 255, 0.85)
    font_size = 56
    font_family = Comfortaa Bold
    position = -380, 170
    halign = center
    valign = center
}

# ===== CLOCK =====
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(255, 255, 255, 0.95)
    font_size = 34
    font_family = Comfortaa Bold
    position = -380, 100
    halign = center
    valign = center
}

# ===== DATE =====
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.65)
    font_size = 15
    font_family = Comfortaa Regular
    position = -380, 50
    halign = center
    valign = center
}

# ===== PASSWORD INPUT =====
input-field {
    monitor =
    size = 240, 44
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(255, 255, 255, 0.08)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##ffffff99"> Enter Password</span>
    hide_input = false
    rounding = 12
    check_color = rgba(100, 220, 180, 0.9)
    fail_color = rgba(220, 80, 80, 0.9)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(220, 180, 80, 0.9)
    position = -380, 10
    halign = center
    valign = center
}
